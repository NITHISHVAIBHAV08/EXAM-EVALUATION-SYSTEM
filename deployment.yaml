apiVersion: apps/v1
kind: Deployment
metadata:
  name: exam-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: exam
  template:
    metadata:
      labels:
        app: exam
    spec:
      containers:
      - name: exam-container
        image: exam-app
        imagePullPolicy: Never
        ports:
        - containerPort: 8080